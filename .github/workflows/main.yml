name: VNC (Debian KDE)

on:
  workflow_dispatch:

jobs:
  secure-vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install KDE + VNC server
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            kde-plasma-desktop \
            tigervnc-standalone-server \
            dbus-x11

      - name: Create VNC User with Secure Password
        run: |
          password=$(openssl rand -base64 12)
          echo "VNC_PASS=$password" >> $GITHUB_ENV

          sudo useradd -m -s /bin/bash vncuser
          echo "vncuser:$password" | sudo chpasswd
          sudo usermod -aG sudo vncuser

          # VNC 設定ディレクトリ作成
          sudo -u vncuser mkdir -p /home/vncuser/.vnc

          # VNC パスワードをセット
          echo "$password" | vncpasswd -f | sudo tee /home/vncuser/.vnc/passwd > /dev/null
          sudo chown vncuser:vncuser /home/vncuser/.vnc/passwd
          sudo chmod 600 /home/vncuser/.vnc/passwd

          # xstartup に KDE を設定
          cat <<EOF | sudo tee /home/vncuser/.vnc/xstartup
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startplasma-x11
          EOF
          sudo chmod +x /home/vncuser/.vnc/xstartup
          sudo chown -R vncuser:vncuser /home/vncuser/.vnc

      - name: Start VNC server
        run: |
          sudo -u vncuser vncserver :1 -geometry 1280x720 -depth 24

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${GITHUB_RUN_ID}

          tsIP=$(tailscale ip -4 | head -n1)
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV

      - name: Show VNC Info
        run: |
          echo "=== VNC ACCESS ==="
          echo "Address: $TAILSCALE_IP:5901"
          echo "Username: vncuser"
          echo "Password: $VNC_PASS"
          echo "=================="
          echo "Use a VNC viewer (RealVNC, TigerVNC, TightVNC) to connect."

      - name: Keep Runner Alive
        run: |
          while true; do sleep 300; done
          
